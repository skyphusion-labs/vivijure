# vivijure-tail: tail consumer for the vivijure-studio core. Receives the core's tail events
# (console logs + uncaught exceptions) and ships them to the self-hosted Loki on the operator's monitoring host over
# Workers VPC (LOKI_VPC -> http://loki:3100). Wire it up by adding to the core wrangler.toml
# (deploy-ordered, AFTER this worker is live):  tail_consumers = [ { service = "vivijure-tail" } ]
#
# Stream labels are low-cardinality {worker,level,phase,module}; job_id is a log-LINE field (a high-
# cardinality label would blow up Loki). account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not
# hardcoded, same as the core. This worker holds no secrets: Loki is network-isolated behind the VPC.
name = "vivijure-tail"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers VPC -> the always-on Loki on the fleet (push path; network-isolated, no token).
[[vpc_services]]
binding = "LOKI_VPC"
service_id = "019ef325-a0e0-7c82-9aed-74696d5da21b"
remote = true
