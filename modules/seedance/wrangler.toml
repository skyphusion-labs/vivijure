# seedance module worker (vivijure-module/1): ByteDance Seedance V1.5 Pro I2V on RunPod, the first
# motion.backend module. Bound into the core as MODULE_SEEDANCE; the registry discovers it from
# GET /module.json and the studio renders the motion.backend stage from it.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-seedance"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# The rendered clip is stored in the shared render bucket so the core / film assembler can find it.
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# Secret, set AFTER deploy (never committed), with a DEDICATED, scoped vivijure RunPod key:
#   ! npx wrangler secret put RUNPOD_API_KEY -c modules/seedance/wrangler.toml
