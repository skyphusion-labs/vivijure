# finish-upscale module worker (vivijure-module/1): Real-ESRGAN 2x/4x spatial upscale on the dedicated
# vivijure-upscale RunPod endpoint (CUDA, separate from vivijure-backend). Bound into the core as
# MODULE_UPSCALE; the registry discovers it from GET /module.json.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core. This worker
# holds no R2 creds -- the endpoint reads/writes the shared bucket by key itself.

name = "vivijure-module-finish-upscale"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Secrets, set AFTER deploy (never committed):
#   ! npx wrangler secret put RUNPOD_API_KEY -c modules/finish-upscale/wrangler.toml
#   ! npx wrangler secret put RUNPOD_ENDPOINT_ID -c modules/finish-upscale/wrangler.toml
