# plan-enhance-py module worker (vivijure-module/1) -- PYTHON.
#
# The second-on-ramp proof: a Vivijure module implemented as a CF Python Worker (Pyodide) instead of
# TypeScript, behind the SAME plan.enhance hook contract over a service binding. Bind into the core as
# MODULE_PLANENHANCE_PY (see the core wrangler.toml); the registry discovers it from GET /module.json
# exactly like a TS module -- the core never knows (or cares) what language answers the hook.
#
# EXPERIMENTAL: CF Python Workers is OPEN BETA (not GA). This is an additive proof module; the render
# core and critical control-plane paths must NOT depend on it.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core + TS modules.

name = "vivijure-module-plan-enhance-py"
main = "src/entry.py"
compatibility_date = "2026-06-01"
# python_workers: enable the Pyodide runtime. No nodejs_compat (this is Python, not JS). The workers-py
# SDK (from workers import ...) is bundled by wrangler >= 4.64 / workers-py >= 1.90.
compatibility_flags = ["python_workers"]
workers_dev = false

[observability]
enabled = true

# No bindings: the rule-based direction pass is pure control-plane logic (no AI, no R2, no GPU). The
# TS reference module uses Workers AI; this Python variant is deterministic + dependency-free, which
# keeps the on-ramp proof self-contained and the conformance round-trip fully offline.
