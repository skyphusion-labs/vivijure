- name: Setup Node.js environment
  uses: actions/setup-node@v6
  with:
    node-version: '22'  # Uses the current stable LTS version for Cloudflare development
    cache: 'npm'        # Automatically caches your node_modules using package-lock.json
- name: Install dependencies
  run: npm ci

- name: Run Typecheck
  run: npm run typecheck

- name: Run Tests
  run: npm run test
