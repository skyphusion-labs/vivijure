name: CI

# Typecheck + test on every push and PR; deploy to Cloudflare on main.
# Runs on the fleet self-hosted runner (damaged, skyphusion-labs/vivijure).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, fleet]
    container: node:22-alpine
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # wrangler builds the video-finish container image at deploy time, which needs the Docker CLI.
      # The job runs in node:22-alpine (no docker), but the host docker.sock is bind-mounted into it,
      # so installing the CLI is enough to reach the daemon and build the image.
      - name: Docker CLI (for the video-finish container image build)
        if: github.ref == 'refs/heads/main'
        run: apk add --no-cache docker-cli

      - name: Deploy (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
