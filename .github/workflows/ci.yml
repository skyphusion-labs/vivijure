name: CI

# Typecheck + test on every push and PR; deploy to Cloudflare on main.
# Runs on the fleet self-hosted runner (damaged, skyphusion-labs/vivijure).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, fleet]
    container: node:22-alpine
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # wrangler builds the video-finish container image at deploy time, which needs `docker build`.
      # The job runs in node:22-alpine (no docker), but the host docker.sock is bind-mounted in, so
      # the CLI reaches the daemon. docker-cli alone is NOT enough: Docker 29 routes `docker build`
      # to the removed legacy builder (exit 125). We need the buildx plugin AND `docker buildx
      # install`, which wires `docker build` -> `docker buildx build` (the plugin binary present but
      # un-installed still falls through to the legacy builder). See issue #68.
      - name: Docker setup (buildx for the video-finish container image build)
        if: github.ref == 'refs/heads/main'
        run: |
          apk add --no-cache docker-cli docker-cli-buildx
          docker buildx install

      # Module workers deploy BEFORE the core. The core binds each module as a service, and a
      # [[services]] binding to a not-yet-deployed service makes the core `wrangler deploy` fail.
      # Deploying modules first keeps every MODULE_* binding pointing at a live service, so adding a
      # new module + its core binding in one change no longer orphans it (the minimax-hailuo gap).
      - name: Deploy module workers (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for module in own-gpu finish-rife keyframe seedance kling minimax-hailuo google-veo vidu-q3 alibaba-wan text-overlay film-titles; do
            echo "Deploying vivijure-module-${module}..."
            npx wrangler deploy -c modules/${module}/wrangler.toml
          done

      - name: Deploy core worker (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
