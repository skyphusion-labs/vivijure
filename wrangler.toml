# Vivijure studio core -- wrangler config.
#
# account_id is NOT hardcoded; it is read from CLOUDFLARE_ACCOUNT_ID (set in .dev.vars locally, or
# injected as a secret in CI). Phase-1 render migration (epic #25): the render API bindings are wired
# below. Mirror every binding change in src/env.ts (the hand-authored Env interface).

name = "vivijure-studio"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# The studio frontend (public/) served via Workers Assets.
assets = { directory = "./public", binding = "ASSETS" }

[observability]
enabled = true

# AI Gateway (LLM storyboard planning + cloud-animate scoring). GATEWAY_ID is a SECRET, not a var:
#   echo "<gateway-slug>" | npx wrangler secret put GATEWAY_ID
[ai]
binding = "AI"

# Storage. R2_RENDERS = the `vivijure` bucket (bundles, keyframes, clips, MP4s, project state).
# R2 = the chat-side `skyphusion-llm` bucket the render flow copies a staged audio bed across from.
# (Transition coupling: revisit moving the audio bed onto R2_RENDERS for a fully standalone studio.)
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

[[r2_buckets]]
binding = "R2"
bucket_name = "skyphusion-llm"

# Fresh, dedicated D1 (Conrad: "use a clean db" -- no migration of the old playground data).
# Provision + apply the schema of record:
#   npx wrangler d1 create vivijure-studio        # paste the returned id below
#   npx wrangler d1 migrations apply vivijure-studio   # applies migrations/0001_init.sql
[[d1_databases]]
binding = "DB"
database_name = "vivijure-studio"
database_id = "bb806935-47a7-4524-93dd-251024794a55"

# --- CPU container Durable Objects (off-GPU work). Build contexts live in containers/<name>/
# --- (migrated from skyphusion-llm-public); the image is each Dockerfile. ---
# --- ENABLED: video-finish only -- the assemble container (ffmpeg concat + audio mux) for the
# --- render pipeline. Its image needs Docker to build; the CI deploy job installs the docker CLI
# --- (apk add docker-cli; see .github/workflows/ci.yml) and the host docker.sock is bind-mounted.
# --- audio-beat-sync + image-prep stay DISABLED below until their features are wired (heavy deps,
# --- unused for now); enabling them = uncomment + add their classes to a NEW migration tag.
[[durable_objects.bindings]]
name = "VIDEO_FINISH"
class_name = "VideoFinishContainer"

[[containers]]
class_name = "VideoFinishContainer"
image = "./containers/video-finish/Dockerfile"
max_instances = 3
# ffmpeg libx264 normalize/encode peaks ~1.2 GiB RSS per clip (measured: 960x960 -> 1080p, medium).
# The default "dev" instance is 256 MiB -> ffmpeg gets OOM-killed (exit 137) -> opaque 500. "standard-1"
# (4 GiB) gives comfortable headroom for the per-clip encode (clips normalize sequentially, so peak is
# one encode at a time) and the crossfade re-encode path. See the first full-film e2e (assemble 500).
instance_type = "standard-1"

# Fresh worker -> initial migration registering the video-finish container DO class.
[[migrations]]
tag = "v1-video-finish"
new_sqlite_classes = ["VideoFinishContainer"]

# Workers VPC: video-finish now runs always-on on the fleet, reached over a private VPC binding
# (issue #83 -- off CF Containers, no cold start). callVideoFinish uses this. The CF Container above
# is kept declared as a transitional fallback until the VPC path is validated in prod, then removed.
[[vpc_services]]
binding = "VIDEO_FINISH_VPC"
service_id = "019ecbe6-9fc1-70a0-9946-14bbec0f51bc"
remote = true

[[vpc_services]]
binding = "IMAGE_PREP_VPC"
service_id = "019ecc06-3084-79f1-a417-c621b1376f56"
remote = true

[[vpc_services]]
binding = "AUDIO_BEAT_SYNC_VPC"
service_id = "019ecc06-3790-7403-9d8f-20f1287a513a"
remote = true

